capability: runtime_config
inputs:
  env_name: required
  service: required
  scope: required
generates:
  - configmap_entry
  - helm_env_wiring
checks:
  - helm_template
  - policy
  - naming_convention
approval:
  required_from:
    - platform-config
template_map:
  configmap_entry:
    template: templates/configmap_entry.tmpl
    output: helm/payments-api/env/${env_name}.yaml
  helm_env_wiring:
    template: templates/helm_env_wiring.tmpl
    output: helm/payments-api/values.yaml

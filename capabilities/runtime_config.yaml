capability: runtime_config
inputs:
  env_name: required
  service: required
  scope: required
  config_name: required
generates:
  - configmap_entry
checks:
  - helm_template
  - policy
  - naming_convention
approval:
  required_from:
    - platform-config
template_map:
  configmap_entry:
    template: templates/configmap_entry.tmpl
    output: helm/payments-api/env/${env_name}.yaml

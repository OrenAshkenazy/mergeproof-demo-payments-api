capability: secret_wiring
inputs:
  secret_name: required
  env_var: required
  service: required
generates:
  - external_secret
  - helm_env_wiring
checks:
  - helm_template
  - policy
  - naming_convention
approval:
  required_from:
    - platform-team
human_gate: secret value provisioning
template_map:
  external_secret:
    template: templates/external_secret.tmpl
    output: envs/prod/payments-api/secrets/${secret_name}.yaml
  helm_env_wiring:
    template: templates/helm_env_wiring.tmpl
    output: helm/payments-api/env/${secret_name}.yaml

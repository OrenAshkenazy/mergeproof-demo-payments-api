capability: worker_deployment
inputs:
  worker_name: required
  service: required
generates:
  - worker_deployment
  - helm_worker_values
  - terraform_worker
checks:
  - helm_template
  - terraform_validate
  - policy
  - naming_convention
approval:
  required_from:
    - platform-team
template_map:
  worker_deployment:
    template: templates/worker_deployment.tmpl
    output: envs/prod/payments-api/workers/${worker_name}-deployment.yaml
  helm_worker_values:
    template: templates/helm_worker_values.tmpl
    output: helm/payments-api/workers/${worker_name}.yaml
  terraform_worker:
    template: templates/terraform_worker.tmpl
    output: terraform/payments-api/workers/${worker_name}.tf
